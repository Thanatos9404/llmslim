name: Release & PyPI Publish

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write  # Required for OIDC PyPI trusted publishing

jobs:
  build-and-publish:
    name: Build and Publish Release to PyPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build wheel twine

      - name: Build Source Distribution and Wheel
        run: python -m build

      - name: Verify Package Distribution Artifacts
        run: twine check dist/*

      - name: Publish Package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Uses OpenID Connect (OIDC) trusted publishing configured on PyPI.
          # Fallback configuration: If token authentication is required, set PYPI_API_TOKEN in GitHub Repository Secrets
          # password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

      - name: Attach Release Assets to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
