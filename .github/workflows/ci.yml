name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
        include:
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip build setuptools wheel
          pip install ruff black mypy pytest pytest-cov twine
          pip install -e ".[all,dev]"

      - name: Run Ruff Linter
        run: ruff check .

      - name: Run Ruff Code Formatter Check
        run: ruff format --check .

      - name: Run MyPy Type Checker
        run: mypy llmslim

      - name: Run Pytest Suite with Coverage (Minimum 90%)
        run: pytest --cov=llmslim --cov-report=term-missing --cov-report=xml --cov-fail-under=90

      - name: Run Benchmark Smoke Test
        run: python benchmarks/benchmark_regression.py

      - name: Build Package Artifacts (Wheel & Sdist)
        run: python -m build

      - name: Validate Package Artifacts
        run: twine check dist/*

      - name: Verify Clean Package Installation
        run: |
          pip install dist/*.whl
          python -c "import llmslim; print(f'llmslim version: {llmslim.__version__}')"

      - name: Upload Coverage to Codecov (Python 3.12 only)
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
