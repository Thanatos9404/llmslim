<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 290" width="100%" height="290">
  <style>
    .bg { fill: #0d1117; rx: 8px; }
    .title { fill: #58a6ff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 16px; font-weight: 600; }
    .label { fill: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 13px; }
    .val { fill: #ffffff; font-family: "JetBrains Mono", Consolas, monospace; font-size: 12px; font-weight: 600; }
    .axis-label { fill: #8b949e; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 11px; }
  </style>
  <rect width="700" height="290" class="bg" stroke="#30363d" stroke-width="1"/>
  <text x="24" y="36" class="title">🔒 Information & Instruction Retention Metrics</text>
  <g transform="translate(24, 75)">
    <text x="0" y="14" class="label">Imperative Instructions Preservation</text>
    <rect x="220" y="2" width="330" height="18" fill="#58a6ff" rx="4"/>
    <text x="560" y="15" class="val">100.0% retained</text>
  </g>
  <g transform="translate(24, 115)">
    <text x="0" y="14" class="label">System Directives Retention</text>
    <rect x="220" y="2" width="330" height="18" fill="#7c3aed" rx="4"/>
    <text x="560" y="15" class="val">100.0% retained</text>
  </g>
  <g transform="translate(24, 155)">
    <text x="0" y="14" class="label">Code Snippet / Markdown Headers</text>
    <rect x="220" y="2" width="325" height="18" fill="#10b981" rx="4"/>
    <text x="555" y="15" class="val">98.4% retained</text>
  </g>
  <g transform="translate(24, 195)">
    <text x="0" y="14" class="label">Named Entities & Numbers (50% ratio)</text>
    <rect x="220" y="2" width="311" height="18" fill="#ffa657" rx="4"/>
    <text x="541" y="15" class="val">94.2% retained</text>
  </g>
  <g transform="translate(24, 235)">
    <text x="0" y="14" class="label">Named Entities & Numbers (30% ratio)</text>
    <rect x="220" y="2" width="292" height="18" fill="#f778ba" rx="4"/>
    <text x="522" y="15" class="val">88.6% retained</text>
  </g>
  <text x="24" y="278" class="axis-label">Evaluated via entity recognition and instruction regex validation</text>
</svg>